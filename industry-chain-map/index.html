<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>产业链全景图工具</title>
    <link rel="stylesheet" href="./css/tokens.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand__title">产业链全景图工具</div>
        </div>
        <div class="toolbar">
          <label class="search">
            <span class="search__label">定位</span>
            <input id="searchInput" type="search" placeholder="按环节名 / 公司名 / 代码搜索" />
          </label>
          <button id="fitBtn" class="icon-btn" type="button" title="适配视图">⤢</button>
          <button id="resetBtn" class="icon-btn" type="button" title="重置视图">↺</button>
        </div>
      </header>

      <main id="workspace" class="workspace">
        <section class="canvas-panel">
          <nav id="industryBar" class="industry-bar" aria-label="行业选择栏"></nav>
          <div id="treeHost" class="tree-host"></div>
        </section>

        <div id="panelResizer" class="panel-resizer" role="separator" aria-orientation="vertical" aria-label="调整详情面板宽度" tabindex="0"></div>

        <aside id="detailPanel" class="detail-panel">
          <div class="detail-panel__empty">点击左侧节点查看详情</div>
        </aside>
      </main>
    </div>

    <script src="./vendor/d3.min.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
